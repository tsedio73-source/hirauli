<!DOCTYPE html>
<html>
<head>
  <title>Village Meet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; background:#0f2027; color:white; font-family:Arial;}
    header { text-align:center; padding:10px; background:#000;}
    #grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:8px; padding:8px;
    }
    video {
      width:100%; border-radius:10px;
      background:black; cursor:pointer;
    }
    #full {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      display:none; background:black;
      justify-content:center; align-items:center;
    }
    #full video { width:95%; max-height:95%; }
  </style>
</head>

<body>

<header>🌐 Village Meet</header>
<div id="grid"></div>

<div id="full" onclick="closeFull()">
  <video id="fullVideo" autoplay controls></video>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCmn1Uex7L4lOFFDRe5m41IPSE-rRFXpFc",
  authDomain: "meet-63945.firebaseapp.com",
  databaseURL: "https://meet-63945-default-rtdb.firebaseio.com",
  projectId: "meet-63945",
  storageBucket: "meet-63945.firebasestorage.app",
  messagingSenderId: "894635124638",
  appId: "1:894635124638:web:b17bab2420a92112cd188f",
  measurementId: "G-JDVDJ5TXS9"
};



firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const room="village-meet";
const userId="user_"+Math.random().toString(36).substr(2);

const pcs = {};
const streamsMap = {};
let localStream;

const grid=document.getElementById("grid");

// 🚀 START
window.onload = async ()=>{
  localStream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });

  addVideo(localStream,true,userId);

  await db.ref(`${room}/users/${userId}`).set(true);

  loadExistingUsers();
  listenNewUsers();
};

// 🔥 LOAD OLD USERS (FIX)
async function loadExistingUsers(){
  const snap = await db.ref(`${room}/users`).once("value");

  snap.forEach(child=>{
    const id = child.key;
    if(id !== userId){
      connectToUser(id);
    }
  });
}

// 🔥 LISTEN NEW USERS
function listenNewUsers(){
  db.ref(`${room}/users`).on("child_added",snap=>{
    const id = snap.key;
    if(id !== userId && !pcs[id]){
      connectToUser(id);
    }
  });
}

// 🔗 CONNECT
function connectToUser(otherId){

  if(pcs[otherId]) return;

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  pcs[otherId]=pc;

  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.ontrack = e=>{
    addVideo(e.streams[0],false,otherId);
  };

  pc.onicecandidate = e=>{
    if(e.candidate){
      db.ref(`${room}/candidates/${otherId}/${userId}`)
        .push(e.candidate.toJSON());
    }
  };

  // 🔥 FIX: decide caller
  const isCaller = userId < otherId;

  if(isCaller){
    pc.createOffer().then(o=>{
      pc.setLocalDescription(o);
      db.ref(`${room}/offers/${otherId}/${userId}`).set(o);
    });
  }

  // receive offer
  db.ref(`${room}/offers/${userId}/${otherId}`)
    .on("value", async snap=>{
      const offer=snap.val();
      if(!offer) return;

      await pc.setRemoteDescription(new RTCSessionDescription(offer));

      const ans=await pc.createAnswer();
      await pc.setLocalDescription(ans);

      db.ref(`${room}/answers/${otherId}/${userId}`).set(ans);
    });

  // receive answer
  db.ref(`${room}/answers/${userId}/${otherId}`)
    .on("value", async snap=>{
      const ans=snap.val();
      if(!ans) return;

      await pc.setRemoteDescription(new RTCSessionDescription(ans));
    });

  // ICE
  db.ref(`${room}/candidates/${userId}/${otherId}`)
    .on("child_added",snap=>{
      pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
}

// 🎥 ADD VIDEO
function addVideo(stream, muted=false, id=""){
  if(streamsMap[id]) return;
  streamsMap[id]=true;

  const video=document.createElement("video");
  video.srcObject=stream;
  video.autoplay=true;
  video.playsInline=true;
  video.muted=muted;

  video.onclick=()=>openFull(stream);

  grid.appendChild(video);
}

// 🔍 FULLSCREEN
function openFull(stream){
  document.getElementById("full").style.display="flex";
  document.getElementById("fullVideo").srcObject=stream;
}

function closeFull(){
  document.getElementById("full").style.display="none";
}

// cleanup
window.addEventListener("beforeunload",()=>{
  db.ref(`${room}/users/${userId}`).remove();
});
</script>

</body>
</html>
