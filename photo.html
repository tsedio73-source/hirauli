<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hirauli Gallery</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

:root {
  --brand: #061188;
  --brand-light: #1a2fd4;
  --accent: #f04e30;
  --bg: #f0f2ff;
  --card: #ffffff;
  --text: #111;
  --muted: #777;
  --border: #e8e8f0;
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding-bottom: 80px;
  overscroll-behavior-y: contain;
}

/* ─── HEADER ─── */
.header {
  background: var(--brand);
  color: white;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 900;
  box-shadow: 0 2px 12px rgba(6,17,136,.35);
}

.header-left h2 {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: .5px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.user-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,.15);
  border-radius: 30px;
  padding: 5px 12px;
  font-size: 13px;
  font-weight: 600;
}

.user-badge .post-count {
  background: white;
  color: var(--brand);
  border-radius: 20px;
  padding: 1px 8px;
  font-size: 12px;
  font-weight: 700;
}

.upload-icon-btn {
  background: white;
  color: var(--brand);
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}

.upload-icon-btn:active { transform: scale(.92); }

/* ─── PULL TO REFRESH ─── */
#ptr-indicator {
  text-align: center;
  padding: 14px;
  font-size: 13px;
  color: var(--brand);
  font-weight: 600;
  display: none;
  transition: all .3s;
}

#ptr-indicator i { margin-right: 6px; }

/* ─── SELECT BAR ─── */
#selectBar {
  display: none;
  background: var(--brand);
  color: white;
  padding: 10px 16px;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 56px;
  z-index: 800;
}

#selectBar.visible { display: flex; }

#selectBar span { font-weight: 600; font-size: 14px; }

.select-actions { display: flex; gap: 10px; }

.select-actions button {
  background: rgba(255,255,255,.2);
  border: none;
  color: white;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}

.select-actions button:hover { background: rgba(255,255,255,.35); }

/* ─── GALLERY GRID ─── */
#gallery {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  max-width: 800px;
  margin: 0 auto;
  padding: 2px;
}

.photo {
  aspect-ratio: 1/1;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  background: #111;
}

.photo img,
.photo video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .3s;
}

.photo:hover img,
.photo:hover video { transform: scale(1.05); }

.photo .video-badge {
  position: absolute;
  bottom: 6px;
  right: 6px;
  background: rgba(0,0,0,.6);
  color: white;
  border-radius: 4px;
  padding: 2px 5px;
  font-size: 11px;
}

.photo.selected::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(6,17,136,.45);
  pointer-events: none;
}

.photo .check-icon {
  display: none;
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--brand);
  color: white;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  z-index: 5;
}

.photo.selected .check-icon { display: flex; }

/* skeleton */
.skeleton {
  background: linear-gradient(90deg, #e0e0e8 25%, #f0f0f8 50%, #e0e0e8 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ─── LOAD MORE ─── */
#loadMoreBtn {
  display: block;
  margin: 18px auto;
  background: var(--brand);
  color: white;
  border: none;
  padding: 10px 28px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: .4px;
}

#loadMoreBtn:disabled {
  background: #bbb;
  cursor: default;
}

/* ─── FEED MODAL ─── */
.feed-modal {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 5000;
  display: none;
  overflow-y: auto;
  overscroll-behavior: contain;
}

.feed-modal.open { display: block; }

.feed-header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--brand);
  z-index: 10;
  gap: 14px;
  color: white;
}

.feed-header button {
  background: rgba(255,255,255,.2);
  border: none;
  color: white;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  font-size: 17px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.feed-header h3 { font-size: 17px; font-weight: 700; }

.feed-post {
  max-width: 600px;
  margin: 0 auto 6px;
  border-bottom: 6px solid var(--bg);
  background: var(--card);
}

.post-user-row {
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.post-user-row .uname {
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.post-user-row .uname i { color: var(--brand); }
.post-user-row .tago { font-size: 12px; color: var(--muted); }

.media-wrapper { position: relative; user-select: none; }

.post-title-overlay {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 10px 12px;
  background: linear-gradient(to bottom, rgba(0,0,0,.65), transparent);
  color: white;
  font-weight: 700;
  font-size: 14px;
  z-index: 3;
}

.media-container {
  background: #000;
  width: 100%;
  min-height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.media-container img,
.media-container video {
  width: 100%;
  max-height: 82vh;
  object-fit: contain;
}

/* double tap heart flash */
.like-flash {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  font-size: 80px;
  color: white;
  pointer-events: none;
  z-index: 10;
  opacity: 0;
  transition: none;
}

.like-flash.show {
  animation: heartPop .7s ease forwards;
}

@keyframes heartPop {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
  40%  { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
  70%  { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1.1); opacity: 0; }
}

.feed-actions {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 18px;
}

.feed-actions .action-btn {
  background: none;
  border: none;
  font-size: 22px;
  color: #333;
  cursor: pointer;
  padding: 2px;
  display: flex;
  align-items: center;
  transition: transform .15s, color .15s;
}

.feed-actions .action-btn:active { transform: scale(.85); }
.feed-actions .action-btn.heart.liked { color: #e74c3c; }
.feed-actions .action-btn.heart.liked i::before { content: "\f004"; font-weight: 900; }

.likes-count {
  font-size: 13px;
  font-weight: 700;
  padding: 0 14px 6px;
}

.comment-area {
  padding: 6px 14px 14px;
  border-top: 1px solid #f5f5f5;
}

.comments-list { font-size: 13px; margin-top: 6px; max-height: 160px; overflow-y: auto; }

.comment {
  padding: 5px 0;
  border-bottom: 1px solid #f8f8f8;
  line-height: 1.4;
}

.comment .cuser { font-weight: 700; margin-right: 4px; }
.comment .ctime { font-size: 11px; color: var(--muted); }

.comment-input-group {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.comment-input-group input {
  flex: 1;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 30px;
  outline: none;
  font-size: 13px;
  background: #fafafa;
  transition: border-color .2s;
}

.comment-input-group input:focus { border-color: var(--brand); background: white; }

.comment-input-group button {
  background: var(--brand);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

/* ─── UPLOAD MODAL ─── */
.upload-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 7000;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.upload-modal.open { display: flex; }

.upload-sheet {
  background: white;
  padding: 24px 20px 30px;
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 480px;
  animation: slideUp .3s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.upload-sheet h3 {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 18px;
  color: var(--brand);
  display: flex;
  align-items: center;
  gap: 8px;
}

.upload-field {
  margin-bottom: 14px;
}

.upload-field label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 6px;
}

.upload-field input[type="text"] {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  outline: none;
  background: #fafafa;
  transition: border-color .2s;
}

.upload-field input:focus { border-color: var(--brand); background: white; }

.file-pick-area {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
  transition: border-color .2s, background .2s;
  position: relative;
}

.file-pick-area:hover { border-color: var(--brand); background: #f5f7ff; }
.file-pick-area i { font-size: 28px; color: var(--brand); margin-bottom: 6px; display: block; }
.file-pick-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

#previewThumb {
  margin-top: 12px;
  text-align: center;
  display: none;
}

#previewThumb img, #previewThumb video {
  max-height: 140px;
  border-radius: 10px;
  max-width: 100%;
}

#progBox {
  width: 100%;
  height: 6px;
  background: #eee;
  border-radius: 10px;
  margin: 12px 0 4px;
  display: none;
  overflow: hidden;
}

#progressBar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--brand), var(--brand-light));
  border-radius: 10px;
  transition: width .3s;
}

#progressText {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  min-height: 16px;
}

.upload-btns {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}

.upload-btns button {
  flex: 1;
  padding: 13px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity .15s;
}

.upload-btns button:active { opacity: .8; }

#shareBtn { background: var(--brand); color: white; }
#cancelBtn { background: #eee; color: #333; }

/* ─── TOAST ─── */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #111;
  color: white;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: all .3s;
  white-space: nowrap;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  grid-column: 1/-1;
}

.empty-state i { font-size: 48px; margin-bottom: 12px; color: #ccd; display: block; }

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h2><i class="fas fa-images" style="margin-right:7px;opacity:.85"></i>Hirauli</h2>
  </div>
  <div class="header-right">
    <div class="user-badge">
      <i class="fas fa-user-circle" style="font-size:15px"></i>
      <span id="userNameDisplay">—</span>
      <span class="post-count" id="postCount">0</span>
    </div>
    <button class="upload-icon-btn" onclick="openUpload()" title="Upload">
      <i class="fas fa-plus"></i>
    </button>
  </div>
</div>

<!-- SELECT BAR -->
<div id="selectBar">
  <span id="selectCount">0 selected</span>
  <div class="select-actions">
    <button onclick="downloadSelected()"><i class="fas fa-download"></i> Download</button>
    <button onclick="cancelSelect()"><i class="fas fa-times"></i> Cancel</button>
  </div>
</div>

<!-- PULL TO REFRESH -->
<div id="ptr-indicator"><i class="fas fa-sync-alt"></i> Refreshing…</div>

<!-- GALLERY -->
<div id="gallery"></div>

<button id="loadMoreBtn" onclick="loadMore()" style="display:none">Load more</button>

<!-- FEED MODAL -->
<div id="feedModal" class="feed-modal">
  <div class="feed-header">
    <button onclick="closeFeed()"><i class="fas fa-arrow-left"></i></button>
    <h3>Posts</h3>
  </div>
  <div id="feedContainer"></div>
</div>

<!-- UPLOAD MODAL -->
<div class="upload-modal" id="uploadModal">
  <div class="upload-sheet">
    <h3><i class="fas fa-cloud-upload-alt"></i> New Upload</h3>

    <div class="upload-field">
      <label>Caption</label>
      <input type="text" id="titleInput" placeholder="Write something…">
    </div>

    <div class="upload-field">
      <label>Photo / Video</label>
      <div class="file-pick-area" id="filePickArea">
        <i class="fas fa-photo-film"></i>
        <span id="fileLabel">Tap to choose image or video</span>
        <input type="file" id="fileInput" accept="image/*,video/*" onchange="onFileChosen(event)">
      </div>
    </div>

    <div id="previewThumb"></div>

    <div id="progBox"><div id="progressBar"></div></div>
    <p id="progressText"></p>

    <div class="upload-btns">
      <button id="shareBtn" onclick="uploadToCloudinary()"><i class="fas fa-share"></i> Share</button>
      <button id="cancelBtn" onclick="closeUpload()"><i class="fas fa-times"></i> Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="gallery.js">
</script>
</body>
</html>
