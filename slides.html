<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide-show</title>
    <style>
        #gallery img{
            border-radius: 20px;
        }
    </style>
        <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "fce30003-a1ab-4782-aafa-e2d8132b8090",
    });
  });
</script>
</head>
<body>
    <div id="gallery"></div>
    <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
   import { getDatabase ,ref,set,get} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyArtybAAgMFeLv1K9b_0GhSh66oYWuDLco",
    authDomain: "news-82329.firebaseapp.com",
    databaseURL: "https://news-82329-default-rtdb.firebaseio.com",
    projectId: "news-82329",
    storageBucket: "news-82329.firebasestorage.app",
    messagingSenderId: "29851688400",
    appId: "1:29851688400:web:7a9c17b2bf758ca76aadd5",
    measurementId: "G-ZN98HBX1ZP"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  

  const dataRef = ref(db, "photos");
  get(dataRef)
  .then((snapshot) => {
    if(snapshot.exists()){
        let data = snapshot.val();
        let usr = 0;
        let all = [];
        let n = 0;
        for(usr in data){
        n++;
        all.push(data[usr]);
        
        }
        
        console.log(all);
        console.log(n);
        let frame = document.getElementById("gallery");
        let src = all[0];
        let img = document.createElement("img");
        let like = document.createElement("span");
        img.src = src;
        img.height = 800;
        img.loading = "lazy";
        img.border = "2px solid black";
        frame.appendChild(img);
        frame.appendChild(like);
        setInterval(() => {
            try {
            img.style.opacity = "0";
            setTimeout(() => {
            let random = Math.floor(Math.random() * n);
            img.src = all[random].mediaUrl;
            let date = new Date(all[random].timestamp);
            like.innerHTML = all[random].likesCount + " Likes " + date.toLocaleString();
            img.style.transition = "0.5s";
            img.style.opacity = "1";
            },600);
            } catch (error) {
                
            }
            
            
        },4000);
        
        
        
    } else{
        
    }
    
  })
  .catch((error) =>{
        console.error(error);
    })
</script>
</body>
</html>
